mixed-port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.quad9.net/dns-query
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu"
    - "time.*.apple.com"
    - "time-ios.apple.com"
    - "pool.ntp.org"
    - "*.pool.ntp.org"
    - "*.stun.*.*"
    - "stun.*.*"
    - "stun.*"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.xboxlive.com"
    - "*.*.stun.playstation.net"

proxies: # LEAVE THIS LINE!

proxy-groups:
  - name: "🚀 Proxy"
    type: select
    proxies: # LEAVE THIS LINE!

  - name: "♻️ Auto"
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 80
    lazy: true
    proxies: # LEAVE THIS LINE!

  - name: "🌐 Global"
    type: select
    proxies:
      - "🚀 Proxy"
      - "♻️ Auto"
      - DIRECT

  - name: "🤖 AI"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "📺 YouTube"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🎬 Streaming"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "💬 Messaging"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🎮 Games"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "👨‍💻 GitHub"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🐦 Social"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "₿ Crypto"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🍎 Apple"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "Ⓜ️ Microsoft"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🔍 Google"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]

  - name: "🌏 Regional"
    type: select
    proxies:
      - "🌐 Global"
      - "🚀 Proxy"
      - "♻️ Auto"
      - DIRECT
  - name: "🇨🇳 China"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇷🇺 Russia"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇮🇷 Iran"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇯🇵 Japan"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇰🇷 Korea"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇸🇬 Singapore"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇺🇸 United States"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]
  - name: "🇪🇺 Europe"
    type: select
    proxies: ["🌐 Global", "🚀 Proxy", "♻️ Auto", DIRECT]

  - name: "🛑 Ads"
    type: select
    remnawave:
      include-proxies: false
    proxies: [REJECT, DIRECT]
  - name: "🏠 Local"
    type: select
    remnawave:
      include-proxies: false
    proxies: [DIRECT]
  - name: "🐟 Final"
    type: select
    proxies:
      - "🌐 Global"
      - "🚀 Proxy"
      - "♻️ Auto"
      - DIRECT

