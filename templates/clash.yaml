mixed-port: 7890
socks-port: 7891
redir-port: 7892
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  use-hosts: true
  enhanced-mode: redir-host
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
    - 9.9.9.9

proxies: # LEAVE THIS LINE!

